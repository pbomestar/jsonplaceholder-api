name: API Tests

on:
  push:
    branches:
      - main
    schedule:
      - cron: "30 19 * * *"

jobs:
  api-tests:
    name: Run API Automation Tests
    container:
      image: maven:4.0.0‑rc‑5‑eclipse‑temurin‑17

    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Run Maven tests
      - name: Run API tests
        run: mvn clean test

      # Upload Cucumber reports
      - name: Upload Cucumber Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/